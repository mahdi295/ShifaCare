services:
  - type: web
    name: shifacare-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false          # Set in Render dashboard
      - key: JWT_SECRET
        sync: false          # Set in Render dashboard
      - key: JWT_EXPIRE
        value: 30d
      - key: COOKIE_EXPIRE
        value: 30
      # CRITICAL: Set CLIENT_URL to your Vercel frontend URL (no trailing slash)
      # e.g. https://shifacare.vercel.app
      - key: CLIENT_URL
        sync: false
      # CRITICAL: Set BACKEND_URL to this Render service's public URL (no trailing slash)
      # e.g. https://shifacare-backend.onrender.com
      - key: BACKEND_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SSL_STORE_ID
        sync: false
      - key: SSL_STORE_PASS
        sync: false
      - key: SSL_IS_LIVE
        value: false         # Change to true only when going live
      # Optional SMTP for password reset emails
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
